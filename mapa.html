<h2 style="text-align:center;">Mapa de Molina de Segura</h2>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function(){

var map = L.map('map').setView([38.054, -1.209], 14);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

// PRUEBA: marcador simple
L.marker([38.054, -1.209]).addTo(map)
.bindPopup("📍 Molina de Segura")
.openPopup();

});
</script>
